<!DOCTYPE html>
<html>
<head>
    <title>GreenShip 🚢</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e0f7e9, #e3f2fd);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 420px;
        }
        h1 { color: #2e7d32; font-size: 28px; margin-bottom: 8px; }
        p { color: #777; margin-bottom: 30px; font-size: 14px; }
        label { font-weight: 600; color: #333; display: block; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
        }
        input:focus { border-color: #2e7d32; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌿 GreenShip</h1>
        <p>Calculate carbon emissions for your shipment instantly</p>
        <form action="/result" method="POST">
            <label>📦 Cargo Weight (kg)</label>
            <input type="number" name="weight" placeholder="e.g. 1000" required>

            <label>📍 From City</label>
            <input type="text" name="origin" placeholder="e.g. Mumbai" required>

            <label>📍 To City</label>
            <input type="text" name="destination" placeholder="e.g. Dubai" required>

            <button type="submit">Calculate Emissions 🌱</button>
        </form>
    </div>
</body>
</html>
